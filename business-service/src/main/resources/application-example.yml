server:
  port: 8080

spring:
  application:
    name: red-culture-business-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/red_culture_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.redculture.platform.mapper: debug

app:
  rag:
    enabled: ${RAG_ENABLED:false}
    sync-on-startup: ${RAG_SYNC_ON_STARTUP:true}
    embedding-base-url: ${RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    embedding-api-key: ${RAG_EMBEDDING_API_KEY:}
    embedding-model: ${RAG_EMBEDDING_MODEL:text-embedding-v3}
    embedding-dimensions: ${RAG_EMBEDDING_DIMENSIONS:1024}
    embedding-batch-size: ${RAG_EMBEDDING_BATCH_SIZE:10}
    qdrant-base-url: ${QDRANT_BASE_URL:http://127.0.0.1:6333}
    qdrant-api-key: ${QDRANT_API_KEY:}
    qdrant-collection: ${QDRANT_COLLECTION:red_culture_content_chunks}
    candidate-multiplier: ${RAG_CANDIDATE_MULTIPLIER:4}
    minimum-vector-score: ${RAG_MINIMUM_VECTOR_SCORE:0.2}
